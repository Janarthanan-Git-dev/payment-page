<!DOCTYPE html>
<html>
<body>

<h3>Debug Page</h3>

<p><b>URL:</b></p>
<div id="url"></div>

<p><b>Token from URL:</b></p>
<div id="token"></div>

<form id="payForm" method="POST" action="https://test.authorize.net/payment/payment">
    <input type="hidden" id="hiddenToken" name="token">
    <button type="button" onclick="submitForm()">Submit to Authorize.net</button>
</form>

<script>
document.getElementById("url").innerText = window.location.href;

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

document.getElementById("token").innerText = token;

document.getElementById("hiddenToken").value = token;

function submitForm() {
    alert("Hidden token length = " + document.getElementById("hiddenToken").value.length);
    document.getElementById("payForm").submit();
}
</script>

</body>
</html>
